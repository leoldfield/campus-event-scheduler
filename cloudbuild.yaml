steps:
  - name: 'gcr.io/cloud-builders/npm'
    args: ['install']
    dir: 'frontend/'
    id: 'Install Frontend Dependencies'
  - name: 'gcr.io/cloud-builders/npm'
    args: ['run', 'build']
    dir: 'frontend/'
    id: 'Build Frontend Application'
  # ... other steps

logsBucket: 'gs://cloudbuild-bucket' # Replace with your bucket name

options:
  logging: GCS_ONLY # Ensures logs go only to your specified GCS bucket
