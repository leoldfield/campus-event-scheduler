# List all events
query ListEvents @auth(level: PUBLIC) {
  eventLists(orderBy: { starttime: ASC }) {
    id
    eventcoord
    eventname
    location
    eventdesc
    starttime
    endtime
    eventstatus
    lat
    lng
    imageUrl
    category
  }
}

# List all users
query ListUsers @auth(level: USER) {
  userLists {
    id
    firstname
    lastname
    email
    password
    age
    major
  }
}

# Get event by event ID
query GetEventByID($id: UUID!) @auth(level: USER) {
  eventList(id: $id) {
    id
    eventcoord
    eventname
    location
    eventdesc
    starttime
    endtime
    lat
    lng
    imageUrl
    category
  }
}

# Create an event
mutation CreateEvent(
  $id: UUID!
  $eventcoord: UUID!
  $eventname: String!
  $location: String!
  $eventdesc: String!
  $starttime: Timestamp!
  $endtime: Timestamp!
  $lat: Float
  $lng: Float
  $imageUrl: String
  $category: String
) @auth(level: USER) {
  eventList_insert(
    data: {
      id: $id
      eventcoord: $eventcoord
      eventname: $eventname
      location: $location
      eventdesc: $eventdesc
      starttime: $starttime
      endtime: $endtime
      eventstatus: true
      lat: $lat
      lng: $lng
      imageUrl: $imageUrl
      category: $category
    }
  )
}

# Get user first name by id
query GetFirstNameByID($id: UUID!) @auth(level: PUBLIC) {
  userList(id: $id) {
    firstname
  }
}

#Get user full name by id
query GetNameByID($id: UUID!) @auth(level: PUBLIC) {
  userList(id: $id) {
    firstname
    lastname
  }
}

#Check user credentials for login
query ValidateUserCredentials($email: String!, $password: String!)
@auth(level: PUBLIC, insecureReason: "Used for MVP login prototype while auth is not yet integrated.") {
  userLists(where: { email: { eq: $email }, password: { eq: $password } }, limit: 1) {
    id
    firstname
    lastname
    email
  }
}

# List all registrations
query ListRegistrations @auth(level: USER) {
  registrations {
    eventId
    userId
    notif
  }
}

# Get registration by event ID and user ID
query GetRegistration($eventId: UUID!, $userId: UUID!) @auth(level: USER) {
  registration(key: { eventId: $eventId, userId: $userId }) {
    eventId
    userId
    notif
  }
}

# Create a registration
mutation CreateRegistration($eventId: UUID!, $userId: UUID!, $notif: Boolean)
@auth(level: USER) {
  registration_insert(data: { eventId: $eventId, userId: $userId, notif: $notif })
}

# Delete a registration
mutation DeleteRegistration($eventId: UUID!, $userId: UUID!)
@auth(level: USER) {
  registration_delete(key: { eventId: $eventId, userId: $userId })
}


# List events a specific user is registered for
query listMyEvents($userId: String!) {
  registrations(filter: { userId: { _eq: $userId } }) {
    eventLists(filter: { id: { _eq: eventId } }) {
      id
      eventname
      location
      eventdesc
      starttime
      endtime
      eventstatus
    }
  }
}

mutation CreateUser(
  $id: UUID!
  $firebaseUid: String
  $firstname: String!
  $lastname: String!
  $email: String!
  $password: String!
  $age: Int!
  $major: String!
) @auth(level: PUBLIC, insecureReason: "Used for MVP signup flow before Firebase Auth integration.") {
  userList_insert(
    data: {
      id: $id
      firebaseUid: $firebaseUid
      firstname: $firstname
      lastname: $lastname
      email: $email
      password: $password
      age: $age
      major: $major
    }
  )
}

query FindUserByEmail($email: String!)
@auth(level: PUBLIC, insecureReason: "Used for duplicate email prevention in signup flow before Firebase Auth integration.") {
  userLists(where: { email: { eq: $email } }, limit: 1) {
    id
    firebaseUid
    firstname
    lastname
    email
  }
}

query GetUserByFirebaseUid($firebaseUid: String!) @auth(level: USER) {
  userLists(where: { firebaseUid: { eq: $firebaseUid } }, limit: 1) {
    id
    firebaseUid
    firstname
    lastname
    email
    age
    major
  }
}

mutation UpdateUserProfile(
  $id: UUID!
  $firstname: String!
  $lastname: String!
  $age: Int!
  $major: String!
) @auth(level: USER) {
  userList_update(
    id: $id
    data: {
      firstname: $firstname
      lastname: $lastname
      age: $age
      major: $major
    }
  )
}


mutation UpdateEvent(
  $id: UUID!
  $eventname: String!
  $location: String!
  $eventdesc: String!
  $starttime: Timestamp!
  $endtime: Timestamp!
  $lat: Float
  $lng: Float
  $imageUrl: String
  $category: String
) @auth(level: USER) {

  eventList_update(
    id: $id
    data: {
      eventname: $eventname
      location: $location
      eventdesc: $eventdesc
      starttime: $starttime
      endtime: $endtime
      lat: $lat
      lng: $lng
      imageUrl: $imageUrl
      category: $category
    }
  )
}